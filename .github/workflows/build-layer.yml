name: Build & Publish Lambda Layer

on:
  push:
    paths:
      - layer/requirements.txt
  workflow_dispatch:

jobs:
  build-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Install layer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r layer/requirements.txt -t layer/python/

      - name: Zip Lambda layer
        run: |
          cd layer
          zip -r pandas-numpy-layer.zip python

      - name: Publish Lambda Layer
        run: |
          aws lambda publish-layer-version \
            --layer-name pandas-numpy-layer \
            --zip-file fileb://layer/pandas-numpy-layer.zip \
            --compatible-runtimes python3.9 python3.10 python3.11 python3.12