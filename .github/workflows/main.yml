name: Deploy Lambda

on:
  push:
    branches:
      - main   # change if your branch name is different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Install zip tool
        uses: montudor/action-install-zip@v1
      - name: Create Zip function for lambda function
        run: zip -r code.zip .
      - name: AWS CLI v2
        uses: imehendi/actions-aws-cli-v2@latest
        with:
          args: "lambda update-function-code \
          --function-name arn:aws:lambda:us-east-1:482268323614:function:test1 \
          --zip-file fileb://code.zip"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFault_REGION: "us-east-1"
        
